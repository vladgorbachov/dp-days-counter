<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>DP Days Counter</title>
    <!--
      Inline pre-paint background prevents the white flash that happens between
      navigation from loading.html and styles.css being parsed. The colour matches
      BrowserWindow's backgroundColor and the dark theme background.
    -->
    <style id="boot-style">
      html, body { background: #0a0a0a; color: #f5e9c8; margin: 0; padding: 0; }
      body.boot-light { background: #faf7ff; color: #1a0b2e; }
      body { opacity: 0; transition: opacity 0.18s ease; }
      body.ready { opacity: 1; }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Title Bar -->
        <div class="title-bar">
            <div class="title-bar-left">
                <img src="../assets/logo.png" alt="Logo" class="logo">
                <span class="app-title">DP DAYS COUNTER</span>
            </div>
            <div class="title-bar-right">
                <button type="button" class="title-bar-btn" id="minimizeBtn" aria-label="Minimize" title="Minimize">
                    <svg class="win-icon" viewBox="0 0 10 1" width="10" height="1" aria-hidden="true">
                        <rect width="10" height="1" fill="currentColor"/>
                    </svg>
                </button>
                <button type="button" class="title-bar-btn" id="maximizeBtn" aria-label="Maximize" title="Maximize">
                    <svg class="win-icon win-icon-maximize" viewBox="0 0 10 10" width="10" height="10" aria-hidden="true">
                        <rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/>
                    </svg>
                    <svg class="win-icon win-icon-restore" viewBox="0 0 10 10" width="10" height="10" aria-hidden="true">
                        <rect x="2.5" y="0.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1"/>
                        <rect x="0.5" y="2.5" width="7" height="7" fill="var(--bg)" stroke="currentColor" stroke-width="1"/>
                    </svg>
                </button>
                <button type="button" class="title-bar-btn close-btn" id="closeBtn" aria-label="Close" title="Close">
                    <svg class="win-icon" viewBox="0 0 10 10" width="10" height="10" aria-hidden="true">
                        <path d="M1 1 L9 9 M9 1 L1 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button class="nav-btn" id="prevMonthBtn" aria-label="Previous month">‹</button>
                    <h2 class="current-month" id="currentMonthText">JANUARY 2024</h2>
                    <button class="nav-btn" id="nextMonthBtn" aria-label="Next month">›</button>
                </div>

                <!-- Week starts on Monday -->
                <div class="weekdays-header">
                    <div class="weekday">Mon</div>
                    <div class="weekday">Tue</div>
                    <div class="weekday">Wed</div>
                    <div class="weekday">Thu</div>
                    <div class="weekday">Fri</div>
                    <div class="weekday">Sat</div>
                    <div class="weekday">Sun</div>
                </div>

                <div class="calendar-grid" id="calendarGrid"></div>

                <div class="statistics-footer">
                    <div class="stat-card">
                        <div class="stat-label">Month Hours</div>
                        <div class="stat-value" id="monthHoursText">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Month Days</div>
                        <div class="stat-value" id="monthDaysText">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Static Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <h3 class="sidebar-title">Get Your DP Days &amp; Hours</h3>

                <div class="date-range-section">
                    <div class="date-input-group">
                        <label class="date-label" for="startDateInput">Start Date</label>
                        <input type="text" class="date-input" id="startDateInput" placeholder="dd-mm-yyyy" readonly>
                        <div class="date-picker" id="startDatePicker"></div>
                    </div>

                    <div class="date-input-group">
                        <label class="date-label" for="endDateInput">End Date</label>
                        <input type="text" class="date-input" id="endDateInput" placeholder="dd-mm-yyyy" readonly>
                        <div class="date-picker" id="endDatePicker"></div>
                    </div>
                </div>

                <div class="results-section">
                    <div class="result-group">
                        <label class="result-label">Total Days</label>
                        <div class="result-value" id="totalDaysResult">0</div>
                    </div>

                    <div class="result-group">
                        <label class="result-label">Total Hours</label>
                        <div class="result-value" id="totalHoursResult">0</div>
                    </div>
                </div>

                <div class="settings-section">
                    <button class="settings-btn" id="settingsBtn">
                        <span class="settings-icon">⚙</span>
                        Settings
                    </button>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div class="modal-overlay" id="settingsModal">
            <div class="modal-content settings-modal">
                <div class="modal-header">
                    <h3>Settings</h3>
                    <button class="modal-close" id="settingsModalCloseBtn" aria-label="Close">✕</button>
                </div>
                <div class="modal-body">
                    <div class="setting-group">
                        <label class="setting-label">Theme</label>
                        <div class="theme-buttons">
                            <button class="theme-btn" id="lightThemeBtn">Light</button>
                            <button class="theme-btn active" id="darkThemeBtn">Dark</button>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label class="setting-label">Updates</label>
                        <button class="update-btn" id="checkUpdatesBtn">Check for Updates</button>
                        <div class="update-status" id="updateStatus"></div>
                        <div class="update-progress" id="updateProgressContainer" style="display:none;">
                            <div class="update-progress-bar" id="updateProgressBar"></div>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label class="setting-label">Version</label>
                        <div class="copyright-text" id="appVersionText">—</div>
                    </div>

                    <div class="copyright-section">
                        <div class="copyright-text">© DeLIon Software. All rights reserved</div>
                        <div class="website-link">www.delionsoft.com</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn cancel-btn" id="settingsCancelBtn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hours Input Modal -->
    <div class="modal-overlay" id="hoursModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Enter DP Hours</h3>
                <button class="modal-close" id="modalCloseBtn" aria-label="Close">✕</button>
            </div>
            <div class="modal-body">
                <div class="date-display" id="modalDateDisplay">Monday, January 1, 2024</div>
                <div class="hours-input-group">
                    <label for="hoursInput">Hours (0-24):</label>
                    <div class="hours-controls">
                        <button class="hours-btn" id="decreaseBtn" aria-label="Decrease">−</button>
                        <input type="text" class="hours-input" id="hoursInput" value="0" maxlength="2">
                        <button class="hours-btn" id="increaseBtn" aria-label="Increase">+</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn save-btn" id="saveBtn">Save</button>
                <button class="modal-btn cancel-btn" id="cancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast for in-app messages (replaces blocking alert()) -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" id="resetDateItem">Reset</div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
