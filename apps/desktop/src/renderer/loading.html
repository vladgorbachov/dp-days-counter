<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>DP Days Counter - Loading</title>
    <style>
        @font-face {
            font-family: 'Orbitron';
            font-style: normal;
            font-weight: 400 900;
            font-display: block;
            src: url('../assets/fonts/orbitron-latin.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC,
                           U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329,
                           U+2000-206F, U+20AC, U+2122, U+2191, U+2193,
                           U+2212, U+2215, U+FEFF, U+FFFD;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: #0a0a0a;
            color: #f5e9c8;
        }

        body {
            font-family: 'Orbitron', 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(ellipse at top, #1a1408 0%, #0a0a0a 60%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .loading-container { text-align: center; max-width: 420px; padding: 40px; }

        .logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 28px;
            background: linear-gradient(135deg, #b8860b 0%, #d4af37 50%, #f4d03f 100%);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            color: #0a0a0a;
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.35);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.05); }
        }

        .app-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #b8860b 0%, #d4af37 50%, #f4d03f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .loading-text {
            font-size: 13px;
            color: #a8956b;
            margin-bottom: 28px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .progress-container {
            background: rgba(31, 26, 16, 0.8);
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 18px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .progress-bar {
            height: 6px;
            background: linear-gradient(90deg, #b8860b 0%, #d4af37 50%, #f4d03f 100%);
            border-radius: 8px;
            width: 0%;
            transition: width 0.2s ease;
            box-shadow: 0 2px 8px rgba(212, 175, 55, 0.4);
        }

        .progress-text {
            font-size: 12px;
            color: #a8956b;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 18px;
        }

        .loading-steps {
            margin-top: 18px;
            font-size: 11px;
            color: #6f5f3a;
            text-align: left;
        }

        .step {
            margin-bottom: 7px;
            opacity: 0.45;
            transition: opacity 0.25s ease, color 0.25s ease;
        }

        .step.active    { opacity: 1; color: #f4d03f; }
        .step.completed { opacity: 0.85; color: #a8956b; }

        .company-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #6f5f3a;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="logo">⚓</div>
        <h1 class="app-title">DP DAYS COUNTER</h1>
        <p class="loading-text">Initializing Application</p>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="progress-text" id="progressText">0%</div>

        <div class="loading-steps">
            <div class="step" id="step1">Loading application core...</div>
            <div class="step" id="step2">Initializing calendar system...</div>
            <div class="step" id="step3">Loading user data...</div>
            <div class="step" id="step4">Preparing interface...</div>
            <div class="step" id="step5">Ready to launch!</div>
        </div>
    </div>

    <div class="company-info">DeLIon Software</div>

    <script>
        // Loading screen is purely decorative — total runtime cut from 5.0s to 2.5s.
        const TOTAL_DURATION_MS = 2500;
        const PROGRESS_TICK_MS = 25;

        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const steps = [
            document.getElementById('step1'),
            document.getElementById('step2'),
            document.getElementById('step3'),
            document.getElementById('step4'),
            document.getElementById('step5')
        ];

        let progress = 0;

        function rampProgress(target) {
            const interval = setInterval(() => {
                if (progress >= target) { clearInterval(interval); return; }
                progress += 1;
                progressBar.style.width = progress + '%';
                progressText.textContent = progress + '%';
            }, PROGRESS_TICK_MS);
        }

        function activateStep(index) {
            if (index > 0) {
                steps[index - 1].classList.remove('active');
                steps[index - 1].classList.add('completed');
            }
            if (index < steps.length) steps[index].classList.add('active');
        }

        // Step schedule mirrors the original 5 stages but compressed 2x.
        const schedule = [
            { at: 250,  step: 0, target: 20  },
            { at: 750,  step: 1, target: 40  },
            { at: 1250, step: 2, target: 60  },
            { at: 1750, step: 3, target: 80  },
            { at: 2250, step: 4, target: 100 }
        ];

        for (const s of schedule) {
            setTimeout(() => { activateStep(s.step); rampProgress(s.target); }, s.at);
        }

        // Navigate to the main window directly. Going via `location.replace`
        // removes the dependency on IPC/preload — even if the preload script
        // failed to expose `electronAPI`, the loading screen will still hand
        // off to index.html. The legacy IPC handler is kept on the main side
        // for older builds but is no longer required.
        function handoffToMain() {
            try {
                location.replace('index.html');
            } catch (err) {
                // Last resort: hard reload.
                location.href = 'index.html';
            }
        }

        setTimeout(handoffToMain, TOTAL_DURATION_MS);

        // Belt-and-braces: if for any reason the navigation didn't happen
        // 1.5 s after the scheduled handoff, force it again.
        setTimeout(() => {
            if (location.pathname.endsWith('loading.html')) handoffToMain();
        }, TOTAL_DURATION_MS + 1500);
    </script>
</body>
</html>
